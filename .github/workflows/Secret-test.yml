name: 🔍 SECRET TEST
on: [push]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Check Secrets
      run: |
        echo "=== DEBUG ==="
        echo "DOCKER_USERNAME='${{ secrets.DOCKER_USERNAME }}'"
        echo "DOCKER_USERNAME length: ${{ secrets.DOCKER_USERNAME != '' && 'OK' || 'EMPTY' }}"
        echo "DOCKER_PASSWORD length: ${{ secrets.DOCKER_PASSWORD != '' && 'OK' || 'EMPTY' }}"