name: 🚀 CI/CD Project
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4        # ✅ v4
    
    - name: Set up Python              # Optionnel pour Docker
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'        # ✅ Guillemets !
    
    - name: Install dependencies       # Optionnel pour Docker
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run tests                  # Commentez si pas de tests
      run: |
        pip install pytest
        pytest tests/ --verbose || true  # Continue même si échec
    
    - name: Build Docker image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/project:latest .
    
    - name: Log in to Docker Hub
      uses: docker/login-action@v3     # ✅ v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Push Docker image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/project:latest